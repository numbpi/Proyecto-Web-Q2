<div class="admin-users-container">
  <div class="header">
    <h1>Gestión de Usuarios</h1>
    <p>Lista de usuarios registrados en el sistema.</p>
  </div>

  <p *ngIf="isLoading" class="loading">
    Cargando usuarios...
  </p>

  <p *ngIf="errorMessage && !isLoading" class="error">
    {{ errorMessage }}
  </p>

  <div *ngIf="!isLoading && !errorMessage" class="users-grid">
    <mat-card class="user-card" *ngFor="let user of users">
      <mat-card-header>
        <mat-icon mat-card-avatar>person</mat-icon>
        <mat-card-title>{{ user.fullName }}</mat-card-title>
        <mat-card-subtitle>{{ user.email }}</mat-card-subtitle>
      </mat-card-header>

      <mat-card-content>
        <mat-chip>{{ user.role }}</mat-chip>
      </mat-card-content>

      <mat-card-actions>
        <button mat-stroked-button color="primary">
          Ver detalles
        </button>
      </mat-card-actions>
    </mat-card>
  </div>
</div>
