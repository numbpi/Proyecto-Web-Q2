<div class="reset-container">
  <mat-card>
    <mat-card-header>
      <mat-card-title> Restablecer Contraseña </mat-card-title>
    </mat-card-header>
    <mat-card-content>
      @if (successMessage) {
        <p class="success">{{ successMessage }}</p>
        <p class="info">Serás redirigido al inicio de sesión...</p>
      } @else if (!token) {
        <p class="error">Token inválido o expirado</p>
      } @else {
        <mat-form-field appearance="outline">
          <mat-label>Nueva Contraseña</mat-label>
          <input matInput type="password" [(ngModel)]="newPassword" placeholder="********" />
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Confirmar Contraseña</mat-label>
          <input matInput type="password" [(ngModel)]="confirmPassword" placeholder="********" />
        </mat-form-field>

        <p class="error" *ngIf="errorMessage">{{ errorMessage }}</p>
      }
    </mat-card-content>

    <mat-card-actions>
      @if (!successMessage && token) {
        <button mat-raised-button color="primary" (click)="onResetPassword()" [disabled]="isLoading">
          {{ isLoading ? 'Restableciendo...' : 'Restablecer' }}
        </button>
      }
      <a routerLink="/login">Volver al inicio de sesión</a>
    </mat-card-actions>
  </mat-card>
</div>
